name: Build and Push Suntek

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Backend (Nativo x64 en GitHub, vuela)
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/luisbauti92/suntek-app-api:latest

      # Build Frontend (Nativo x64)
      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/luisbauti92/suntek-app-web:latest
          build-args: |
            VITE_API_URL=http://localhost:8080/api